<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniFile | Smart Universal File Converter</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
body { font-family: 'Inter', sans-serif; }
.drop-zone { border: 2px dashed #cbd5e1; transition: all 0.2s; }
.drop-zone.dragover { border-color: #3b82f6; background: #eff6ff; }
.tool-card { transition: all 0.2s; cursor: pointer; }
.tool-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); }
.loader { border: 4px solid #f3f4f6; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.preview-img { max-height: 300px; object-fit: contain; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #f1f5f9; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
.output-card { animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

<header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 shrink-0 z-20">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xl font-bold shadow-lg shadow-blue-200">
      <i class="fa-solid fa-layer-group"></i>
    </div>
    <div>
      <h1 class="font-bold text-lg leading-tight text-slate-900">OmniFile</h1>
      <p class="text-xs text-slate-500">Smart File Converter</p>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <span class="text-xs font-medium px-3 py-1.5 bg-green-50 text-green-700 rounded-full border border-green-200">
      <i class="fa-solid fa-shield-halved mr-1"></i> 100% Local
    </span>
    <button onclick="App.resetAll()" class="text-sm text-slate-500 hover:text-blue-600 font-medium transition-colors">
      <i class="fa-solid fa-rotate-right mr-1"></i> Reset
    </button>
  </div>
</header>

<div class="flex flex-1 overflow-hidden">
  <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0">
    <div class="p-4 border-b border-slate-100">
      <div id="globalDropZone" class="drop-zone rounded-xl p-4 text-center cursor-pointer bg-slate-50 hover:bg-blue-50">
        <i class="fa-solid fa-cloud-arrow-up text-2xl text-blue-500 mb-2"></i>
        <p class="text-xs font-medium text-slate-600">Drop files anywhere</p>
        <input type="file" id="globalFileInput" class="hidden" multiple>
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto p-2 space-y-1" id="categoryNav"></nav>
    <div class="p-4 border-t border-slate-100 text-xs text-slate-400">
      <p>PDF, Image, ZIP, Text & more.</p>
      <p class="mt-1">No data leaves your device.</p>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto p-8 relative" id="mainContent"></main>
</div>

<div id="processingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 hidden flex flex-col items-center justify-center">
  <div class="loader mb-4"></div>
  <p id="processingText" class="text-slate-600 font-medium">Processing...</p>
  <p id="processingSub" class="text-sm text-slate-400 mt-1"></p>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

const App = {
  files: [],
  currentTool: null,
  currentCategory: 'All',
  lastExtractedText: '',
  previewObjectUrl: null,
  detectedPdfType: 'unknown',

  // Output state
  resultBlob: null,
  resultName: '',
  resultUrl: null,

  tools: [
    { id: 'pdf-merger', name: 'PDF Merger', cat: 'PDF', icon: 'fa-file-pdf', color: 'red', desc: 'Merge multiple PDFs into one document', accepts: 'application/pdf', multiple: true, ext: 'pdf', previewable: false },
    { id: 'pdf-splitter', name: 'PDF Splitter', cat: 'PDF', icon: 'fa-scissors', color: 'red', desc: 'Extract specific pages or page ranges', accepts: 'application/pdf', multiple: false, ext: 'pdf', previewable: false },
    { id: 'pdf-compressor', name: 'PDF Compressor', cat: 'PDF', icon: 'fa-compress', color: 'red', desc: 'Convert any file to PDF and compress it', accepts: '*/*', multiple: false, ext: 'pdf', previewable: false },
    { id: 'pdf-to-text', name: 'PDF to Text', cat: 'PDF', icon: 'fa-file-word', color: 'blue', desc: 'Extract all readable text from PDF', accepts: 'application/pdf', multiple: false, ext: 'txt', previewable: true },
    { id: 'pdf-to-excel', name: 'PDF to Excel', cat: 'PDF', icon: 'fa-file-excel', color: 'green', desc: 'Extract PDF tables to CSV format', accepts: 'application/pdf', multiple: false, ext: 'csv', previewable: true },
    { id: 'pdf-to-image', name: 'PDF to Image', cat: 'PDF', icon: 'fa-image', color: 'purple', desc: 'Render every page as PNG/JPG and ZIP them', accepts: 'application/pdf', multiple: false, ext: 'zip', previewable: false },
    { id: 'pdf-rotator', name: 'PDF Rotator', cat: 'PDF', icon: 'fa-rotate-right', color: 'orange', desc: 'Rotate pages 90°, 180°, or 270°', accepts: 'application/pdf', multiple: false, ext: 'pdf', previewable: false },
    { id: 'pdf-watermarker', name: 'PDF Watermarker', cat: 'PDF', icon: 'fa-stamp', color: 'teal', desc: 'Add text watermark across all pages', accepts: 'application/pdf', multiple: false, ext: 'pdf', previewable: false },
    { id: 'pdf-page-numbers', name: 'PDF Page Numbers', cat: 'PDF', icon: 'fa-list-ol', color: 'indigo', desc: 'Add page numbers anywhere on pages', accepts: 'application/pdf', multiple: false, ext: 'pdf', previewable: false },
    { id: 'pdf-protector', name: 'PDF Protector', cat: 'PDF', icon: 'fa-lock', color: 'slate', desc: 'Password protect your PDF', accepts: 'application/pdf', multiple: false, ext: 'pdf', previewable: false },
    { id: 'pdf-unlocker', name: 'PDF Unlocker', cat: 'PDF', icon: 'fa-lock-open', color: 'slate', desc: 'Remove password (if you own the file)', accepts: 'application/pdf', multiple: false, ext: 'pdf', previewable: false },
    { id: 'pdf-ocr', name: 'PDF OCR', cat: 'PDF', icon: 'fa-eye', color: 'cyan', desc: 'Make scanned PDFs searchable', accepts: 'application/pdf', multiple: false, ext: 'txt', previewable: true },
    { id: 'img-convert', name: 'Image Converter', cat: 'Image', icon: 'fa-image', color: 'purple', desc: 'Convert between PNG, JPG, WebP', accepts: 'image/*', multiple: false, ext: 'png', previewable: true },
    { id: 'img-compress', name: 'Image Compressor', cat: 'Image', icon: 'fa-compress', color: 'purple', desc: 'Resize & reduce image size', accepts: 'image/*', multiple: false, ext: 'jpg', previewable: true },
    { id: 'img-rotate', name: 'Image Rotator', cat: 'Image', icon: 'fa-rotate-right', color: 'orange', desc: 'Rotate images 90°, 180°, or 270°', accepts: 'image/*', multiple: false, ext: 'png', previewable: true },
    { id: 'img-watermark', name: 'Image Watermarker', cat: 'Image', icon: 'fa-stamp', color: 'teal', desc: 'Add text watermark to photos', accepts: 'image/*', multiple: false, ext: 'png', previewable: true },
    { id: 'zip-create', name: 'ZIP Creator', cat: 'Archive', icon: 'fa-file-zipper', color: 'yellow', desc: 'Create ZIP archive from any files', accepts: '*/*', multiple: true, ext: 'zip', previewable: false },
    { id: 'zip-extract', name: 'ZIP Extractor', cat: 'Archive', icon: 'fa-box-open', color: 'yellow', desc: 'Extract contents from ZIP files', accepts: 'application/zip', multiple: false, ext: 'zip', previewable: true },
    { id: 'text-merge', name: 'Text Merger', cat: 'Text', icon: 'fa-file-lines', color: 'blue', desc: 'Combine text, CSV, JSON, MD files', accepts: 'text/plain,.csv,.json,.md,.txt', multiple: true, ext: 'txt', previewable: true },
    { id: 'ocr-image', name: 'Image OCR', cat: 'General', icon: 'fa-eye', color: 'cyan', desc: 'Extract text from any image', accepts: 'image/*', multiple: false, ext: 'txt', previewable: true },
    { id: 'img-watermark-remover', name: 'Watermark Remover', cat: 'Image', icon: 'fa-eraser', color: 'emerald', desc: 'Remove text watermarks from images using inpainting', accepts: 'image/*', multiple: false, ext: 'png', previewable: true },
    { id: 'img-watermark', name: 'Image Watermarker', cat: 'Image', icon: 'fa-stamp', color: 'teal', desc: 'Add text watermark to photos', accepts: 'image/*', multiple: false, ext: 'png', previewable: true },
    { id: 'video-watermark-remover', name: 'Video Watermark Remover', cat: 'Video', icon: 'fa-eraser', color: 'emerald', desc: 'Remove static watermark areas from videos frame-by-frame', accepts: 'video/*', multiple: false, ext: 'mp4', previewable: true },
    { id: 'video-watermarker', name: 'Video Watermarker', cat: 'Video', icon: 'fa-stamp', color: 'teal', desc: 'Add text/image watermark to videos', accepts: 'video/*', multiple: false, ext: 'mp4', previewable: true },
    { id: 'file-info', name: 'File Inspector', cat: 'General', icon: 'fa-circle-info', color: 'gray', desc: 'View metadata & magic bytes', accepts: '*/*', multiple: false, ext: '', previewable: true },
  ],

  init() {
    this.renderSidebar();
    this.renderGrid();
    this.setupDragDrop();
    this.setupGlobalFileInput();
  },

  renderSidebar() {
    const cats = ['All', 'PDF', 'Image', 'Video', 'Archive', 'Text', 'General'];
    const icons = { 'All': 'fa-border-all', 'PDF': 'fa-file-pdf', 'Image': 'fa-image', 'Video': 'fa-video', 'Archive': 'fa-file-zipper', 'Text': 'fa-file-lines', 'General': 'fa-screwdriver-wrench' };
    const nav = document.getElementById('categoryNav');
    nav.innerHTML = cats.map(cat => {
      const count = cat === 'All' ? this.tools.length : this.tools.filter(t => t.cat === cat).length;
      const active = this.currentCategory === cat ? 'bg-blue-50 text-blue-700 border-blue-200' : 'text-slate-600 hover:bg-slate-50 border-transparent';
      return `<button onclick="App.setCategory('${cat}')" class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium border ${active} transition-all mb-1">
        <span class="flex items-center gap-2"><i class="fa-solid ${icons[cat]} w-5 text-center"></i> ${cat === 'All' ? 'All Tools' : cat + ' Tools'}</span>
        <span class="text-xs bg-white border border-slate-200 rounded-md px-2 py-0.5 text-slate-500">${count}</span>
      </button>`;
    }).join('');
  },

  renderGrid() {
    const main = document.getElementById('mainContent');
    const filtered = this.currentCategory === 'All' ? this.tools : this.tools.filter(t => t.cat === this.currentCategory);
    main.innerHTML = `
      <div class="max-w-6xl mx-auto">
        <div class="mb-8">
          <h2 class="text-2xl font-bold text-slate-900">${this.currentCategory === 'All' ? 'All Tools' : this.currentCategory + ' Tools'}</h2>
          <p class="text-slate-500 mt-1">Select a tool. Files are processed locally in your browser.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
          ${filtered.map(tool => this.toolCard(tool)).join('')}
        </div>
      </div>`;
  },

  toolCard(tool) {
    const colorMap = { red: 'bg-red-50 text-red-600 border-red-100', blue: 'bg-blue-50 text-blue-600 border-blue-100', green: 'bg-green-50 text-green-600 border-green-100', purple: 'bg-purple-50 text-purple-600 border-purple-100', orange: 'bg-orange-50 text-orange-600 border-orange-100', teal: 'bg-teal-50 text-teal-600 border-teal-100', indigo: 'bg-indigo-50 text-indigo-600 border-indigo-100', slate: 'bg-slate-100 text-slate-600 border-slate-200', cyan: 'bg-cyan-50 text-cyan-600 border-cyan-100', yellow: 'bg-yellow-50 text-yellow-600 border-yellow-100', gray: 'bg-gray-50 text-gray-600 border-gray-100' };
    const previewBadge = tool.previewable ? '<span class="text-[10px] bg-green-100 text-green-700 px-1.5 py-0.5 rounded border border-green-200 ml-2">Preview</span>' : '';
    return `
      <div onclick="App.selectTool('${tool.id}')" class="tool-card bg-white rounded-xl border border-slate-200 p-5 hover:border-blue-300">
        <div class="flex items-start justify-between mb-3">
          <div class="w-12 h-12 rounded-lg ${colorMap[tool.color]} flex items-center justify-center text-xl border">
            <i class="fa-solid ${tool.icon}"></i>
          </div>
          <span class="text-xs font-semibold px-2 py-1 rounded-md bg-slate-100 text-slate-500 border border-slate-200">${tool.cat}</span>
        </div>
        <h3 class="font-bold text-slate-900 mb-1">${tool.name} ${previewBadge}</h3>
        <p class="text-sm text-slate-500 leading-relaxed">${tool.desc}</p>
        <div class="mt-4 flex items-center gap-2 text-xs text-slate-400">
          <i class="fa-solid fa-check-circle text-green-500"></i>
          <span>Client-side processing</span>
        </div>
      </div>`;
  },

  setCategory(cat) {
    this.currentCategory = cat;
    this.currentTool = null;
    this.renderSidebar();
    this.renderGrid();
  },

  selectTool(id) {
    this.currentTool = this.tools.find(t => t.id === id);
    this.files = [];
    this.lastExtractedText = '';
    this.clearResult();
    this.renderWorkspace();
  },

  clearResult() {
    if (this.resultUrl) { URL.revokeObjectURL(this.resultUrl); this.resultUrl = null; }
    this.resultBlob = null;
    this.resultName = '';
  },

  renderWorkspace() {
    const tool = this.currentTool;
    const main = document.getElementById('mainContent');
    const accept = tool.accepts;
    const multiple = tool.multiple ? 'multiple' : '';
    main.innerHTML = `
      <div class="max-w-5xl mx-auto">
        <button onclick="App.backToGrid()" class="text-sm text-slate-500 hover:text-blue-600 font-medium mb-6 flex items-center gap-2 transition-colors">
          <i class="fa-solid fa-arrow-left"></i> Back to tools
        </button>
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
          <div class="px-8 py-6 border-b border-slate-100 bg-slate-50/50">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 rounded-xl bg-${tool.color}-50 text-${tool.color}-600 border border-${tool.color}-100 flex items-center justify-center text-2xl">
                <i class="fa-solid ${tool.icon}"></i>
              </div>
              <div>
                <h2 class="text-2xl font-bold text-slate-900">${tool.name}</h2>
                <p class="text-slate-500">${tool.desc}</p>
              </div>
            </div>
          </div>
          <div class="flex flex-col lg:flex-row">
            <div class="lg:w-2/5 p-8 border-r border-slate-100">
              <div id="workspaceDropZone" class="drop-zone rounded-xl p-8 text-center cursor-pointer bg-slate-50 mb-4 relative">
                <input type="file" id="toolFileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="${accept}" ${multiple}>
                <i class="fa-solid fa-cloud-arrow-up text-4xl text-blue-500 mb-3"></i>
                <p class="font-semibold text-slate-700">Drop files here or click to browse</p>
                <p class="text-xs text-slate-400 mt-2">Accepts: ${accept === '*/*' ? 'All files' : accept}</p>
              </div>
              <div id="fileList" class="space-y-2 max-h-64 overflow-y-auto"></div>
              <div id="toolOptions" class="mt-6 space-y-4"></div>
              <div id="autoDetectBadge" class="hidden mt-4 p-3 rounded-lg border text-sm"></div>
            </div>
            <div class="lg:w-3/5 p-8 flex flex-col">

              <!-- INPUT PREVIEW -->
              <div id="previewArea" class="flex-1 bg-slate-50 rounded-xl border border-slate-200 flex items-center justify-center min-h-[200px] mb-4">
                <div class="text-center text-slate-400">
                  <i class="fa-solid fa-file-circle-question text-4xl mb-2"></i>
                  <p>Upload files to see preview</p>
                </div>
              </div>

              <!-- OUTPUT AREA -->
              <div id="outputArea" class="hidden flex-1 bg-white rounded-xl border border-slate-200 flex flex-col min-h-[200px] mb-4 overflow-hidden">
                <div class="px-4 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                  <div class="flex items-center gap-2">
                    <i class="fa-solid fa-circle-check text-green-500"></i>
                    <span class="text-sm font-semibold text-slate-700">Output Ready</span>
                    <span id="outputSize" class="text-xs text-slate-400 ml-2"></span>
                  </div>
                  <span id="outputTypeBadge" class="text-[10px] font-semibold px-2 py-0.5 rounded bg-blue-50 text-blue-600 border border-blue-100">FILE</span>
                </div>
                <div id="outputContent" class="flex-1 p-4 overflow-auto flex items-center justify-center bg-slate-50/30"></div>
              </div>

              <div id="resultStats" class="hidden mb-4 p-4 rounded-lg">
                <div class="flex items-center gap-3">
                  <i id="resultIcon" class="fa-solid fa-check-circle text-xl"></i>
                  <div>
                    <p class="font-semibold" id="resultTitle">Success!</p>
                    <p class="text-sm" id="resultStatsText"></p>
                  </div>
                </div>
              </div>

              <div class="flex items-center justify-between pt-4 border-t border-slate-100 gap-3">
                <div class="text-sm text-slate-500">
                  <i class="fa-solid fa-shield-halved text-green-500 mr-1"></i>
                  Files never leave your browser
                </div>
                <div class="flex items-center gap-2">
                  <button id="downloadBtn" onclick="App.downloadResult()" disabled class="hidden px-5 py-2.5 bg-green-600 hover:bg-green-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold rounded-lg shadow-lg shadow-green-200 transition-all flex items-center gap-2">
                    <i class="fa-solid fa-download"></i> Download Output
                  </button>
                  <button id="executeBtn" onclick="App.execute()" disabled class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold rounded-lg shadow-lg shadow-blue-200 transition-all flex items-center gap-2">
                    <i class="fa-solid fa-play"></i> Process Files
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    this.setupToolDragDrop();
    this.setupToolFileInput();
    this.renderToolOptions();
  },

  backToGrid() {
    this.currentTool = null;
    this.files = [];
    this.lastExtractedText = '';
    this.clearResult();
    if (this.previewObjectUrl) { URL.revokeObjectURL(this.previewObjectUrl); this.previewObjectUrl = null; }
    this.renderGrid();
  },

  setupDragDrop() {
    const zone = document.getElementById('globalDropZone');
    const input = document.getElementById('globalFileInput');
    zone.addEventListener('click', () => input.click());
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('dragover');
      if (e.dataTransfer.files.length) this.addFiles(Array.from(e.dataTransfer.files));
    });
    input.addEventListener('change', e => { if (e.target.files.length) this.addFiles(Array.from(e.target.files)); });
  },

  setupGlobalFileInput() {
    document.getElementById('globalFileInput').addEventListener('change', e => {
      if (e.target.files.length) this.addFiles(Array.from(e.target.files));
    });
  },

  setupToolDragDrop() {
    const zone = document.getElementById('workspaceDropZone');
    if (!zone) return;
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files).filter(f => this.validateFile(f));
      if (files.length) this.addFiles(files);
    });
  },

  setupToolFileInput() {
    const input = document.getElementById('toolFileInput');
    if (!input) return;
    input.addEventListener('change', e => {
      const files = Array.from(e.target.files).filter(f => this.validateFile(f));
      if (files.length) this.addFiles(files);
    });
  },

  validateFile(file) {
    if (!this.currentTool) return true;
    const acc = this.currentTool.accepts;
    if (acc === '*/*') return true;
    const types = acc.split(',');
    const nameLower = file.name.toLowerCase();
    return types.some(t => {
      t = t.trim();
      if (t.startsWith('.')) return nameLower.endsWith(t);
      if (t.endsWith('/*')) return file.type.startsWith(t.replace('/*', ''));
      if (t === 'application/pdf' && nameLower.endsWith('.pdf')) return true;
      if (t === 'application/zip' && (nameLower.endsWith('.zip') || nameLower.endsWith('.epub'))) return true;
      if (t.startsWith('image/') && nameLower.match(/\.(png|jpe?g|gif|webp|bmp|tiff?|svg)$/)) return true;
      if (t.includes('text/plain') && nameLower.match(/\.(txt|csv|json|md|log)$/)) return true;
      return file.type === t;
    });
  },

  addFiles(newFiles) {
    if (!this.currentTool) {
      alert('Please select a tool from the grid first, then upload files.');
      return;
    }
    // Clear any previous result when new files are added
    this.clearResult();
    this.hideOutput();

    if (!this.currentTool.multiple && newFiles.length > 1) newFiles = [newFiles[0]];
    if (!this.currentTool.multiple) this.files = [];
    newFiles.forEach(file => {
      this.files.push({ id: Math.random().toString(36).slice(2), file, name: file.name, size: file.size, type: file.type });
    });
    this.renderFileList();
    this.renderPreview();
    document.getElementById('executeBtn').disabled = this.files.length === 0;
    const stats = document.getElementById('resultStats');
    if (stats) stats.classList.add('hidden');
    if (this.currentTool.id === 'pdf-compressor' && this.files.length > 0) {
      this.autoDetectPdfType(this.files[0].file);
    }
  },

  hideOutput() {
    const outputArea = document.getElementById('outputArea');
    const previewArea = document.getElementById('previewArea');
    const downloadBtn = document.getElementById('downloadBtn');
    if (outputArea) outputArea.classList.add('hidden');
    if (previewArea) previewArea.classList.remove('hidden');
    if (downloadBtn) { downloadBtn.classList.add('hidden'); downloadBtn.disabled = true; }
  },

  showOutput() {
    const outputArea = document.getElementById('outputArea');
    const previewArea = document.getElementById('previewArea');
    const downloadBtn = document.getElementById('downloadBtn');
    if (outputArea) outputArea.classList.remove('hidden');
    if (previewArea) previewArea.classList.add('hidden');
    if (downloadBtn) { downloadBtn.classList.remove('hidden'); downloadBtn.disabled = false; }
  },

  removeFile(id) {
    this.files = this.files.filter(f => f.id !== id);
    this.renderFileList();
    this.renderPreview();
    document.getElementById('executeBtn').disabled = this.files.length === 0;
    const badge = document.getElementById('autoDetectBadge');
    if (badge) badge.classList.add('hidden');
    // Also clear result if files change
    this.clearResult();
    this.hideOutput();
  },

  renderFileList() {
    const list = document.getElementById('fileList');
    if (!list) return;
    if (this.files.length === 0) { list.innerHTML = ''; return; }
    list.innerHTML = this.files.map(f => {
      const size = f.size > 1024 * 1024 ? (f.size / (1024 * 1024)).toFixed(2) + ' MB' : (f.size / 1024).toFixed(1) + ' KB';
      const icon = this.getFileIcon(f.type);
      return `
        <div class="flex items-center justify-between p-3 bg-white border border-slate-200 rounded-lg shadow-sm">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-8 h-8 rounded bg-slate-100 flex items-center justify-center text-slate-500 shrink-0">
              <i class="fa-solid ${icon}"></i>
            </div>
            <div class="min-w-0">
              <p class="text-sm font-medium text-slate-700 truncate">${f.name}</p>
              <p class="text-xs text-slate-400">${size}</p>
            </div>
          </div>
          <button onclick="App.removeFile('${f.id}')" class="text-slate-400 hover:text-red-500 p-1 transition-colors">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>`;
    }).join('');
  },

  getFileIcon(type) {
    if (type.includes('pdf')) return 'fa-file-pdf';
    if (type.includes('image')) return 'fa-image';
    if (type.includes('zip')) return 'fa-file-zipper';
    if (type.includes('text')) return 'fa-file-lines';
    return 'fa-file';
  },

  async renderPreview() {
    const area = document.getElementById('previewArea');
    if (!area || this.files.length === 0) return;

    if (this.previewObjectUrl) { URL.revokeObjectURL(this.previewObjectUrl); this.previewObjectUrl = null; }

    const f = this.files[0];
    if (f.type.startsWith('image/')) {
      this.previewObjectUrl = URL.createObjectURL(f.file);
      area.innerHTML = `<img src="${this.previewObjectUrl}" class="preview-img rounded-lg shadow-sm" alt="preview">`;
    } else if (f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf')) {
      area.innerHTML = '<div class="text-slate-400"><i class="fa-solid fa-file-pdf text-4xl mb-2"></i><p>PDF loaded (' + this.files.length + ' file' + (this.files.length > 1 ? 's' : '') + ')</p><p class="text-xs mt-1">' + this.formatBytes(f.size) + '</p></div>';
      try {
        const data = await f.file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data }).promise;
        const page = await pdf.getPage(1);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const vp = page.getViewport({ scale: 1.5 });
        canvas.width = vp.width; canvas.height = vp.height;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        area.innerHTML = '';
        area.appendChild(canvas);
        canvas.className = 'rounded-lg shadow-sm max-h-[200px] w-auto';
      } catch(e) { console.warn('PDF preview error:', e); }
    } else if (f.type.startsWith('video/') || f.name.toLowerCase().match(/\.(mp4|webm|mov|avi|mkv|flv)$/)) {
      const url = URL.createObjectURL(f.file);
      area.innerHTML = `<div class="w-full flex flex-col items-center gap-2"><video src="${url}" controls class="max-h-[200px] rounded-lg shadow-sm w-full max-w-md" preload="metadata"></video><p class="text-xs text-slate-400">${f.name}</p></div>`;
      this.previewObjectUrl = url;
    } else if (f.type === 'application/zip' || f.name.toLowerCase().endsWith('.zip')) {
      area.innerHTML = `<div class="text-slate-400"><i class="fa-solid fa-file-zipper text-4xl mb-2"></i><p>ZIP archive ready</p></div>`;
    } else if (f.type.startsWith('text/') || f.name.match(/\.(txt|csv|json|md)$/i)) {
      try {
        const text = await f.file.text();
        area.innerHTML = `<pre class="text-xs text-slate-600 bg-white p-4 rounded-lg border border-slate-200 max-h-[200px] overflow-auto w-full text-left">${text.slice(0, 2000).replace(/</g, '&lt;').replace(/>/g, '&gt;')}${text.length > 2000 ? '...' : ''}</pre>`;
      } catch(e) { area.innerHTML = '<div class="text-slate-400"><p>Text file loaded</p></div>'; }
    } else {
      area.innerHTML = `<div class="text-slate-400"><i class="fa-solid fa-file text-4xl mb-2"></i><p>${f.name}</p><p class="text-xs">${this.formatBytes(f.size)}</p></div>`;
    }
  },

  async autoDetectPdfType(file) {
    const badge = document.getElementById('autoDetectBadge');
    if (!badge) return;
    badge.classList.remove('hidden');

    const name = file.name.toLowerCase();
    const isImage = file.type.startsWith('image/') || name.match(/\.(png|jpe?g|gif|webp|bmp|tiff?|svg|ico)$/);
    const isText = file.type.startsWith('text/') || name.match(/\.(txt|csv|md|json|log|xml|html|css|js|ts)$/);
    const isPdf = name.endsWith('.pdf') || file.type === 'application/pdf';

    if (isImage) {
      this.detectedPdfType = 'image-input';
      badge.innerHTML = `<i class="fa-solid fa-image mr-2"></i><b>Image detected.</b> Will convert to PDF then compress.`;
      badge.className = 'mt-4 p-3 rounded-lg border text-sm bg-purple-50 border-purple-200 text-purple-700';
      return;
    }
    if (isText) {
      this.detectedPdfType = 'text-input';
      badge.innerHTML = `<i class="fa-solid fa-file-lines mr-2"></i><b>Text file detected.</b> Will convert to PDF then compress.`;
      badge.className = 'mt-4 p-3 rounded-lg border text-sm bg-green-50 border-green-200 text-green-700';
      return;
    }
    if (!isPdf) {
      this.detectedPdfType = 'generic';
      badge.innerHTML = `<i class="fa-solid fa-file mr-2"></i><b>File detected.</b> Will embed into PDF then compress.`;
      badge.className = 'mt-4 p-3 rounded-lg border text-sm bg-blue-50 border-blue-200 text-blue-700';
      return;
    }

    badge.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Analyzing PDF...';
    badge.className = 'mt-4 p-3 rounded-lg border text-sm bg-blue-50 border-blue-200 text-blue-700';
    try {
      const bytes = await file.arrayBuffer();
      const pdf = await PDFLib.PDFDocument.load(bytes);
      const pageCount = pdf.getPageCount();
      let totalTextLength = 0;
      try {
        const pdfjsDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
        const samplePages = Math.min(pageCount, 3);
        for (let i = 1; i <= samplePages; i++) {
          const page = await pdfjsDoc.getPage(i);
          const content = await page.getTextContent();
          totalTextLength += content.items.map(item => item.str).join('').length;
        }
      } catch(e) { totalTextLength = 0; }
      const avgTextPerPage = totalTextLength / Math.min(pageCount, 3);
      const isLargeFile = file.size > 2 * 1024 * 1024;
      if (avgTextPerPage < 50 || isLargeFile) {
        this.detectedPdfType = 'image-heavy';
        badge.innerHTML = `<i class="fa-solid fa-images mr-2"></i><b>Image-heavy PDF detected.</b> Will compress images automatically.`;
        badge.className = 'mt-4 p-3 rounded-lg border text-sm bg-purple-50 border-purple-200 text-purple-700';
      } else {
        this.detectedPdfType = 'text';
        badge.innerHTML = `<i class="fa-solid fa-file-lines mr-2"></i><b>Text document detected.</b> Will optimize structure & remove metadata.`;
        badge.className = 'mt-4 p-3 rounded-lg border text-sm bg-green-50 border-green-200 text-green-700';
      }
    } catch(e) {
      this.detectedPdfType = 'generic';
      badge.innerHTML = `<i class="fa-solid fa-file mr-2"></i><b>Non-PDF file detected.</b> Will embed into PDF then compress.`;
      badge.className = 'mt-4 p-3 rounded-lg border text-sm bg-blue-50 border-blue-200 text-blue-700';
    }
  },

  async execute() {
    if (this.files.length === 0) return;
    const tool = this.currentTool;
    this.showProcessing(true, 'Processing...', tool.name);
    this.clearResult();

    try {
      let resultBlob, resultName;
      const f = this.files[0].file;
      const originalSize = f.size;

      switch (tool.id) {
        case 'pdf-merger': resultBlob = await this.mergePdfs(this.files.map(x => x.file)); resultName = 'merged.pdf'; break;
        case 'pdf-splitter': resultBlob = await this.splitPdf(f, document.getElementById('optRange').value); resultName = 'split.pdf'; break;
        case 'pdf-compressor': resultBlob = await this.smartCompressPdf(f); resultName = 'compressed.pdf'; break;
        case 'pdf-to-text': resultBlob = await this.extractTextFromPdf(f); resultName = 'extracted-text.txt'; break;
        case 'pdf-to-excel': resultBlob = await this.pdfToExcel(f); resultName = 'extracted.csv'; break;
        case 'pdf-to-image': resultBlob = await this.pdfToImages(f, document.getElementById('optFormat').value, parseFloat(document.getElementById('optScale').value)); resultName = 'pages.zip'; break;
        case 'pdf-rotator': resultBlob = await this.rotatePdf(f, parseInt(document.getElementById('optAngle').value)); resultName = 'rotated.pdf'; break;
        case 'pdf-watermarker': resultBlob = await this.watermarkPdf(f, document.getElementById('optText').value || 'DRAFT', parseInt(document.getElementById('optOpacity').value) / 10); resultName = 'watermarked.pdf'; break;
        case 'pdf-page-numbers': resultBlob = await this.addPageNumbers(f, parseInt(document.getElementById('optStart').value) || 1, document.getElementById('optPos').value); resultName = 'numbered.pdf'; break;
        case 'pdf-protector':
          const pw = document.getElementById('optPass').value;
          if (!pw) throw new Error('Please enter a password');
          resultBlob = await this.protectPdf(f, pw); resultName = 'protected.pdf'; break;
        case 'pdf-unlocker':
          const upw = document.getElementById('optPass').value;
          if (!upw) throw new Error('Please enter the current password');
          resultBlob = await this.unlockPdf(f, upw); resultName = 'unlocked.pdf'; break;
        case 'pdf-ocr': resultBlob = await this.ocrPdf(f); resultName = 'ocr-text.txt'; break;
        case 'img-convert': resultBlob = await this.convertImage(f, document.getElementById('optFormat').value); resultName = 'converted.' + document.getElementById('optFormat').value.split('/')[1]; break;
        case 'img-compress': resultBlob = await this.compressImage(f, parseInt(document.getElementById('optWidth').value) || 1920, parseInt(document.getElementById('optQuality').value) / 10); resultName = 'compressed.jpg'; break;
        case 'img-rotate': resultBlob = await this.rotateImage(f, parseInt(document.getElementById('optAngle').value)); resultName = 'rotated.png'; break;
        case 'img-watermark': resultBlob = await this.watermarkImage(f, document.getElementById('optText').value || 'Sample', document.getElementById('optColor').value); resultName = 'watermarked.png'; break;
        case 'img-watermark-remover': resultBlob = await this.removeImageWatermark(f, document.getElementById('optPosition').value, document.getElementById('optSize').value); resultName = 'watermark-removed.png'; break;
        case 'video-watermarker': resultBlob = await this.watermarkVideo(f, document.getElementById('optText').value || 'Sample', document.getElementById('optPos').value, document.getElementById('optColor').value, parseInt(document.getElementById('optOpacity').value) / 10); resultName = 'watermarked-video.mp4'; break;
        case 'video-watermark-remover': resultBlob = await this.removeVideoWatermark(f, document.getElementById('optPosition').value, document.getElementById('optSize').value); resultName = 'watermark-removed-video.mp4'; break;
        case 'zip-create': resultBlob = await this.createZip(this.files.map(x => x.file)); resultName = 'archive.zip'; break;
        case 'zip-extract': resultBlob = await this.extractZip(f); resultName = 'extracted.zip'; break;
        case 'text-merge': resultBlob = await this.mergeTextFiles(this.files.map(x => x.file)); resultName = 'merged.txt'; break;
        case 'ocr-image': resultBlob = await this.ocrImage(f); resultName = 'ocr-text.txt'; break;
        case 'file-info': 
          await this.showFileInfoAsync(f); 
          this.showProcessing(false);
          return;
        default: throw new Error('Tool not implemented');
      }

      // Store result and show preview
      this.resultBlob = resultBlob;
      this.resultName = resultName;
      this.resultUrl = URL.createObjectURL(resultBlob);
      await this.showResult(resultBlob, resultName, tool, originalSize);

    } catch (err) {
      console.error(err);
      alert('Error: ' + (err.message || 'Unknown error occurred'));
    } finally {
      this.showProcessing(false);
    }
  },

  async showResult(blob, name, tool, originalSize) {
    this.showOutput();
    const content = document.getElementById('outputContent');
    const sizeEl = document.getElementById('outputSize');
    const typeBadge = document.getElementById('outputTypeBadge');
    const stats = document.getElementById('resultStats');

    if (sizeEl) sizeEl.textContent = this.formatBytes(blob.size);
    if (typeBadge) typeBadge.textContent = name.split('.').pop().toUpperCase();

    // Determine if we can preview
    const isText = name.endsWith('.txt') || name.endsWith('.csv') || name.endsWith('.md') || name.endsWith('.json');
    const isImage = name.endsWith('.png') || name.endsWith('.jpg') || name.endsWith('.jpeg') || name.endsWith('.webp') || name.endsWith('.gif');
    const isZip = name.endsWith('.zip');
    const isPdf = name.endsWith('.pdf');

    if (isText) {
      const text = await blob.text();
      content.innerHTML = `
        <div class="w-full h-full flex flex-col output-card">
          <div class="flex items-center justify-between mb-2">
            <span class="text-xs font-medium text-slate-500">${text.length.toLocaleString()} characters</span>
            <button onclick="App.downloadResult()" class="text-xs px-2 py-1 bg-blue-50 text-blue-600 rounded border border-blue-200 hover:bg-blue-100 transition-colors">
              <i class="fa-solid fa-download mr-1"></i>Download
            </button>
          </div>
          <textarea readonly class="flex-1 w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-xs font-mono text-slate-700 resize-none focus:outline-none" style="min-height: 180px;">${text.replace(/</g, '&lt;').replace(/>/g, '&gt;').slice(0, 10000)}${text.length > 10000 ? '\n... (truncated, download for full content)' : ''}</textarea>
        </div>`;
    } else if (isImage) {
      content.innerHTML = `
        <div class="output-card flex flex-col items-center gap-3">
          <img src="${this.resultUrl}" class="max-h-[260px] rounded-lg shadow-sm border border-slate-200 object-contain" alt="output preview">
          <div class="text-xs text-slate-500">${name} · ${this.formatBytes(blob.size)}</div>
        </div>`;
    } else if (isZip) {
      // Show file list preview for ZIP
      try {
        const zip = await JSZip.loadAsync(blob);
        let fileList = [];
        zip.forEach((path, entry) => { if (!entry.dir) fileList.push(path); });
        const listHtml = fileList.slice(0, 30).map(p => `<li class="text-xs text-slate-600 py-0.5 border-b border-slate-50"><i class="fa-solid fa-file text-slate-400 mr-1.5 text-[10px]"></i>${p}</li>`).join('');
        const more = fileList.length > 30 ? `<p class="text-xs text-slate-400 mt-1">...and ${fileList.length - 30} more files</p>` : '';
        content.innerHTML = `
          <div class="output-card w-full">
            <div class="flex items-center gap-2 mb-2">
              <i class="fa-solid fa-file-zipper text-yellow-500"></i>
              <span class="text-sm font-semibold text-slate-700">${name}</span>
              <span class="text-xs text-slate-400">(${fileList.length} files)</span>
            </div>
            <ul class="max-h-[200px] overflow-y-auto bg-slate-50 rounded-lg border border-slate-200 p-3">${listHtml}</ul>
            ${more}
          </div>`;
      } catch(e) {
        content.innerHTML = `<div class="output-card text-slate-500 text-sm"><i class="fa-solid fa-file-zipper text-yellow-500 mr-2"></i>${name} · ${this.formatBytes(blob.size)}</div>`;
      }
    } else if (isPdf) {
      // Try to render first page preview
      try {
        const data = await blob.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data }).promise;
        const page = await pdf.getPage(1);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const vp = page.getViewport({ scale: 1.2 });
        canvas.width = vp.width; canvas.height = vp.height;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        content.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'output-card flex flex-col items-center gap-3';
        wrap.innerHTML = `<div class="text-xs text-slate-500 mb-1">${name} · ${this.formatBytes(blob.size)} · ${pdf.numPages} pages</div>`;
        canvas.className = 'max-h-[240px] rounded-lg shadow-sm border border-slate-200';
        wrap.appendChild(canvas);
        content.appendChild(wrap);
      } catch(e) {
        content.innerHTML = `<div class="output-card text-slate-500 text-sm"><i class="fa-solid fa-file-pdf text-red-500 mr-2"></i>${name} · ${this.formatBytes(blob.size)}</div>`;
      }
    } else if (name.endsWith('.webm') || name.endsWith('.mp4')) {
      // Video output preview
      content.innerHTML = `
        <div class="output-card flex flex-col items-center gap-3 w-full">
          <video src="${this.resultUrl}" controls class="max-h-[240px] rounded-lg shadow-sm border border-slate-200 w-full max-w-md" preload="metadata"></video>
          <div class="text-xs text-slate-500">${name} · ${this.formatBytes(blob.size)}</div>
        </div>`;
    } else {
      content.innerHTML = `<div class="output-card text-slate-500 text-sm"><i class="fa-solid fa-file text-slate-400 mr-2"></i>${name} · ${this.formatBytes(blob.size)}</div>`;
    }

    // Show compression stats if applicable
    if (tool.id === 'pdf-compressor' && stats) {
      const newSize = blob.size;
      const saved = originalSize - newSize;
      const pct = ((saved / originalSize) * 100).toFixed(1);
      const statsText = document.getElementById('resultStatsText');
      const resultIcon = document.getElementById('resultIcon');
      const resultTitle = document.getElementById('resultTitle');
      if (saved > 0) {
        statsText.innerHTML = `Reduced from <b>${this.formatBytes(originalSize)}</b> to <b>${this.formatBytes(newSize)}</b> — saved <b>${this.formatBytes(saved)} (${pct}%)</b>`;
        stats.className = 'mb-4 p-4 bg-green-50 border border-green-200 rounded-lg';
        resultIcon.className = 'fa-solid fa-check-circle text-xl text-green-600';
        resultTitle.textContent = 'Compressed!';
        resultTitle.className = 'font-semibold text-green-800';
        stats.querySelector('div').className = 'flex items-center gap-3 text-green-800';
      } else {
        statsText.innerHTML = `File is already optimally compressed. Size changed from <b>${this.formatBytes(originalSize)}</b> to <b>${this.formatBytes(newSize)}</b>.`;
        stats.className = 'mb-4 p-4 bg-amber-50 border border-amber-200 rounded-lg';
        resultIcon.className = 'fa-solid fa-circle-info text-xl text-amber-600';
        resultTitle.textContent = 'Already Optimized';
        resultTitle.className = 'font-semibold text-amber-800';
        stats.querySelector('div').className = 'flex items-center gap-3 text-amber-800';
      }
      stats.classList.remove('hidden');
    } else if (stats) {
      stats.classList.add('hidden');
    }
  },

  downloadResult() {
    if (!this.resultBlob || !this.resultName) return;
    this.downloadBlob(this.resultBlob, this.resultName);
  },

  formatBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
  },

  showProcessing(show, text, sub) {
    const el = document.getElementById('processingOverlay');
    if (!show) { el.classList.add('hidden'); return; }
    document.getElementById('processingText').textContent = text || 'Processing...';
    document.getElementById('processingSub').textContent = sub || '';
    el.classList.remove('hidden');
  },

  showSuccess(name) {
    const div = document.createElement('div');
    div.className = 'fixed top-6 right-6 bg-green-600 text-white px-6 py-4 rounded-xl shadow-2xl z-50 flex items-center gap-3 animate-bounce';
    div.innerHTML = `<i class="fa-solid fa-check-circle text-xl"></i><div><p class="font-bold">Done!</p><p class="text-sm text-green-100">${name} is ready</p></div>`;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 4000);
  },

  downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  },

  resetAll() {
    this.files = []; this.currentTool = null; this.currentCategory = 'All';
    this.clearResult();
    if (this.previewObjectUrl) { URL.revokeObjectURL(this.previewObjectUrl); this.previewObjectUrl = null; }
    this.renderSidebar(); this.renderGrid();
  },

  async mergePdfs(files) {
    const merged = await PDFLib.PDFDocument.create();
    for (const file of files) {
      const pdf = await PDFLib.PDFDocument.load(await file.arrayBuffer());
      const pages = await merged.copyPages(pdf, pdf.getPageIndices());
      pages.forEach(p => merged.addPage(p));
    }
    return new Blob([await merged.save()], { type: 'application/pdf' });
  },

  async splitPdf(file, rangeStr) {
    const pdf = await PDFLib.PDFDocument.load(await file.arrayBuffer());
    const newPdf = await PDFLib.PDFDocument.create();
    const total = pdf.getPageCount();
    const indices = [];
    if (!rangeStr.trim()) throw new Error('Please enter a page range');
    rangeStr.split(',').forEach(part => {
      part = part.trim();
      if (part.includes('-')) {
        const [s, e] = part.split('-').map(Number);
        if (isNaN(s) || isNaN(e)) throw new Error('Invalid range: ' + part);
        for (let i = s - 1; i < e; i++) if (i >= 0 && i < total) indices.push(i);
      } else {
        const n = Number(part) - 1;
        if (isNaN(n)) throw new Error('Invalid page number: ' + part);
        if (n >= 0 && n < total) indices.push(n);
      }
    });
    if (indices.length === 0) throw new Error('Invalid page range or no pages selected');
    const pages = await newPdf.copyPages(pdf, indices);
    pages.forEach(p => newPdf.addPage(p));
    return new Blob([await newPdf.save()], { type: 'application/pdf' });
  },

  async smartCompressPdf(file) {
    const name = file.name.toLowerCase();
    const isImage = file.type.startsWith('image/') || name.match(/\.(png|jpe?g|gif|webp|bmp|tiff?|svg|ico)$/);
    const isText = file.type.startsWith('text/') || name.match(/\.(txt|csv|md|json|log|xml|html|css|js|ts)$/);
    const isPdf = name.endsWith('.pdf') || file.type === 'application/pdf';

    let pdfBytes;
    let originalSize = file.size;

    if (isImage) {
      this.showProcessing(true, 'Converting image to PDF...', 'PDF Compressor');
      pdfBytes = await this.imageToPdf(file);
    } else if (isText) {
      this.showProcessing(true, 'Converting text to PDF...', 'PDF Compressor');
      pdfBytes = await this.textToPdf(file);
    } else if (!isPdf) {
      this.showProcessing(true, 'Converting file to PDF...', 'PDF Compressor');
      pdfBytes = await this.genericToPdf(file);
    } else {
      pdfBytes = await file.arrayBuffer();
    }

    this.showProcessing(true, 'Step 1: Optimizing structure...', 'Smart Compression');
    const losslessBlob = await this.losslessCompressPdf(pdfBytes);
    const losslessSize = losslessBlob.size;
    const losslessSaved = originalSize - losslessSize;
    const losslessPct = (losslessSaved / originalSize) * 100;
    if (losslessPct >= 10) {
      this.showProcessing(true, 'Done! Structure optimized.', 'Smart Compression');
      return losslessBlob;
    }
    this.showProcessing(true, 'Step 2: Compressing images...', 'Smart Compression');
    const lossyBlob = await this.lossyCompressPdf(pdfBytes, 150, 0.35);
    const lossySize = lossyBlob.size;
    if (lossySize < losslessSize) {
      this.showProcessing(true, 'Done! Images compressed.', 'Smart Compression');
      return lossyBlob;
    } else {
      this.showProcessing(true, 'Done! Structure optimized.', 'Smart Compression');
      return losslessBlob;
    }
  },

  async losslessCompressPdf(bytes) {
    const pdf = await PDFLib.PDFDocument.load(bytes);
    try {
      pdf.setTitle(''); pdf.setAuthor(''); pdf.setSubject(''); pdf.setKeywords([]);
      pdf.setProducer('OmniFile'); pdf.setCreator('OmniFile');
    } catch(e) { /* ignore metadata errors */ }
    const optimized = await pdf.save({ 
      useObjectStreams: true,
      addDefaultPage: false,
      preserveExistingEncryption: false
    });
    return new Blob([optimized], { type: 'application/pdf' });
  },

  async lossyCompressPdf(bytes, dpi, jpegQuality) {
    const scale = dpi / 72;
    const pdf = await PDFLib.PDFDocument.load(bytes);
    const newPdf = await PDFLib.PDFDocument.create();
    const totalPages = pdf.getPageCount();
    const pdfjsDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    for (let i = 0; i < totalPages; i++) {
      this.showProcessing(true, `Compressing page ${i+1}/${totalPages}...`, 'Smart Compression');
      const page = await pdfjsDoc.getPage(i + 1);
      const vp = page.getViewport({ scale });
      canvas.width = vp.width;
      canvas.height = vp.height;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      const jpegBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', jpegQuality));
      if (!jpegBlob) throw new Error('Canvas to JPEG conversion failed on page ' + (i + 1));
      const jpegBytes = new Uint8Array(await jpegBlob.arrayBuffer());
      const origPage = pdf.getPage(i);
      const { width, height } = origPage.getSize();
      const jpgImage = await newPdf.embedJpg(jpegBytes);
      const newPage = newPdf.addPage([width, height]);
      newPage.drawImage(jpgImage, { x: 0, y: 0, width, height });
    }
    return new Blob([await newPdf.save({ useObjectStreams: true })], { type: 'application/pdf' });
  },

  async imageToPdf(file) {
    const img = await this.loadImage(file);
    const pdf = await PDFLib.PDFDocument.create();
    let imgW = img.width, imgH = img.height;
    // A4 at 72 DPI = 595 x 842 points
    const pageW = 595, pageH = 842;
    // Scale to fit within page with margins
    const margin = 36;
    const maxW = pageW - margin * 2;
    const maxH = pageH - margin * 2;
    const scale = Math.min(maxW / imgW, maxH / imgH, 1);
    const drawW = imgW * scale;
    const drawH = imgH * scale;
    const x = (pageW - drawW) / 2;
    const y = (pageH - drawH) / 2;

    const page = pdf.addPage([pageW, pageH]);
    let embedImage;
    const name = file.name.toLowerCase();
    if (name.endsWith('.png') || name.endsWith('.webp') || name.endsWith('.gif')) {
      const bytes = await file.arrayBuffer();
      embedImage = await pdf.embedPng(bytes);
    } else {
      const bytes = await file.arrayBuffer();
      embedImage = await pdf.embedJpg(bytes);
    }
    page.drawImage(embedImage, { x, y, width: drawW, height: drawH });
    return await pdf.save();
  },

  async textToPdf(file) {
    const text = await file.text();
    const pdf = await PDFLib.PDFDocument.create();
    const font = await pdf.embedFont(PDFLib.StandardFonts.Helvetica);
    const pageW = 595, pageH = 842;
    const margin = 50;
    const lineHeight = 14;
    const maxWidth = pageW - margin * 2;
    const maxLinesPerPage = Math.floor((pageH - margin * 2) / lineHeight);

    const paragraphs = text.split('\n');
    let allLines = [];
    for (const para of paragraphs) {
      const words = para.split(' ');
      let currentLine = '';
      for (const word of words) {
        const test = currentLine ? currentLine + ' ' + word : word;
        const width = font.widthOfTextAtSize(test, 12);
        if (width > maxWidth && currentLine) {
          allLines.push(currentLine);
          currentLine = word;
        } else {
          currentLine = test;
        }
      }
      if (currentLine) allLines.push(currentLine);
      allLines.push('');
    }

    let pageLines = [];
    for (const line of allLines) {
      if (pageLines.length >= maxLinesPerPage) {
        const page = pdf.addPage([pageW, pageH]);
        pageLines.forEach((l, i) => {
          page.drawText(l, { x: margin, y: pageH - margin - (i + 1) * lineHeight, size: 12, font });
        });
        pageLines = [];
      }
      pageLines.push(line);
    }
    if (pageLines.length > 0) {
      const page = pdf.addPage([pageW, pageH]);
      pageLines.forEach((l, i) => {
        page.drawText(l, { x: margin, y: pageH - margin - (i + 1) * lineHeight, size: 12, font });
      });
    }
    return await pdf.save();
  },

  async genericToPdf(file) {
    // For any non-PDF, non-image, non-text file: create a PDF with file info
    const pdf = await PDFLib.PDFDocument.create();
    const font = await pdf.embedFont(PDFLib.StandardFonts.Helvetica);
    const boldFont = await pdf.embedFont(PDFLib.StandardFonts.HelveticaBold);
    const pageW = 595, pageH = 842;
    const margin = 60;
    const page = pdf.addPage([pageW, pageH]);

    page.drawText('File Embed Report', { x: margin, y: pageH - margin, size: 24, font: boldFont, color: PDFLib.rgb(0.1, 0.3, 0.6) });
    page.drawText('Generated by OmniFile PDF Compressor', { x: margin, y: pageH - margin - 28, size: 10, font, color: PDFLib.rgb(0.5, 0.5, 0.5) });

    const info = [
      ['Original Filename', file.name],
      ['File Size', this.formatBytes(file.size)],
      ['MIME Type', file.type || 'Unknown / Binary'],
      ['Last Modified', new Date(file.lastModified).toLocaleString()],
    ];

    let y = pageH - margin - 70;
    info.forEach(([label, value]) => {
      page.drawText(label + ':', { x: margin, y, size: 11, font: boldFont, color: PDFLib.rgb(0.3, 0.3, 0.3) });
      page.drawText(value, { x: margin + 140, y, size: 11, font, color: PDFLib.rgb(0.1, 0.1, 0.1) });
      y -= 22;
    });

    y -= 20;
    page.drawText('Note: This file was embedded into a PDF container for compression.', { x: margin, y, size: 10, font, color: PDFLib.rgb(0.4, 0.4, 0.4) });
    page.drawText('The original binary data is preserved inside this PDF.', { x: margin, y: y - 16, size: 10, font, color: PDFLib.rgb(0.4, 0.4, 0.4) });

    return await pdf.save();
  },

  async pdfToExcel(file) {
    const text = await this.extractTextFromPdf(file);
    const csv = text.split('\n').map(line => {
      line = line.trim();
      if (!line) return '';
      let cols = line.split('\t');
      if (cols.length <= 1) cols = line.split(/\s{2,}/);
      return cols.map(c => {
        c = c.trim();
        if (c.includes(',') || c.includes('"')) return '"' + c.replace(/"/g, '""') + '"';
        return c;
      }).join(',');
    }).join('\n');
    return new Blob([csv], { type: 'text/csv' });
  },

  async pdfToImages(file, format, scale) {
    const data = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data }).promise;
    const zip = new JSZip();
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    for (let i = 1; i <= pdf.numPages; i++) {
      this.showProcessing(true, `Rendering page ${i}/${pdf.numPages}...`, 'PDF to Image');
      const page = await pdf.getPage(i);
      const vp = page.getViewport({ scale });
      canvas.width = vp.width; canvas.height = vp.height;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      const blob = await new Promise(r => canvas.toBlob(r, `image/${format}`, 0.95));
      if (!blob) throw new Error('Canvas export failed for page ' + i);
      zip.file(`page_${String(i).padStart(3, '0')}.${format}`, blob);
    }
    return await zip.generateAsync({ type: 'blob' });
  },

  async rotatePdf(file, angle) {
    const pdf = await PDFLib.PDFDocument.load(await file.arrayBuffer());
    const pages = pdf.getPages();
    pages.forEach(page => {
      let current = 0;
      try {
        const rot = page.getRotation();
        current = (rot && typeof rot.angle === 'number') ? rot.angle : 0;
      } catch(e) { current = 0; }
      page.setRotation(PDFLib.degrees((current + angle) % 360));
    });
    return new Blob([await pdf.save()], { type: 'application/pdf' });
  },

  async watermarkPdf(file, text, opacity) {
    const pdf = await PDFLib.PDFDocument.load(await file.arrayBuffer());
    const pages = pdf.getPages();
    const font = await pdf.embedFont(PDFLib.StandardFonts.Helvetica);
    pages.forEach(page => {
      const { width, height } = page.getSize();
      const charWidth = 24;
      page.drawText(text, {
        x: (width - (text.length * charWidth)) / 2,
        y: height / 2,
        size: 48,
        font,
        color: PDFLib.rgb(0.5, 0.5, 0.5),
        opacity,
        rotate: PDFLib.degrees(-45)
      });
    });
    return new Blob([await pdf.save()], { type: 'application/pdf' });
  },

  async addPageNumbers(file, start, position) {
    const pdf = await PDFLib.PDFDocument.load(await file.arrayBuffer());
    const pages = pdf.getPages();
    const font = await pdf.embedFont(PDFLib.StandardFonts.Helvetica);
    pages.forEach((page, idx) => {
      const { width, height } = page.getSize();
      const text = String(idx + start);
      const tw = text.length * 7;
      let x = width / 2 - tw / 2, y = 20;
      if (position.includes('right')) x = width - 50;
      if (position.includes('left')) x = 30;
      if (position.includes('top')) y = height - 30;
      page.drawText(text, { x, y, size: 12, font, color: PDFLib.rgb(0, 0, 0) });
    });
    return new Blob([await pdf.save()], { type: 'application/pdf' });
  },

  async protectPdf(file, password) {
    const pdf = await PDFLib.PDFDocument.load(await file.arrayBuffer());
    return new Blob([await pdf.save({ password: password })], { type: 'application/pdf' });
  },

  async unlockPdf(file, password) {
    const pdf = await PDFLib.PDFDocument.load(await file.arrayBuffer(), { password: password });
    return new Blob([await pdf.save()], { type: 'application/pdf' });
  },

  async ocrPdf(file) {
    const data = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data }).promise;
    const worker = await Tesseract.createWorker('eng');
    let fullText = '';
    try {
      for (let i = 1; i <= pdf.numPages; i++) {
        this.showProcessing(true, `OCR page ${i}/${pdf.numPages}...`, 'PDF OCR');
        const page = await pdf.getPage(i);
        const vp = page.getViewport({ scale: 2 });
        const canvas = document.createElement('canvas');
        canvas.width = vp.width; canvas.height = vp.height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        const { data: { text } } = await worker.recognize(canvas);
        fullText += `\n--- Page ${i} ---\n${text}`;
      }
    } finally {
      await worker.terminate();
    }
    return new Blob([fullText], { type: 'text/plain' });
  },

  async extractTextFromPdf(file) {
    const data = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n';
    }
    return new Blob([text], { type: 'text/plain' });
  },

  async loadImage(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = URL.createObjectURL(file);
    });
  },

  async imageToCanvas(file) {
    const img = await this.loadImage(file);
    const canvas = document.createElement('canvas');
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(img.src);
    return { canvas, ctx, img };
  },

  async convertImage(file, format) {
    const { canvas } = await this.imageToCanvas(file);
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if (blob) resolve(blob);
        else reject(new Error('Image conversion failed'));
      }, format, 0.95);
    });
  },

  async compressImage(file, maxWidth, quality) {
    const { canvas, img } = await this.imageToCanvas(file);
    if (img.width > maxWidth) {
      const scale = maxWidth / img.width;
      canvas.width = maxWidth;
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if (blob) resolve(blob);
        else reject(new Error('Image compression failed'));
      }, 'image/jpeg', quality);
    });
  },

  async rotateImage(file, angle) {
    const { canvas, ctx, img } = await this.imageToCanvas(file);
    const rad = angle * Math.PI / 180;
    if (angle === 90 || angle === 270) { canvas.width = img.height; canvas.height = img.width; }
    else { canvas.width = img.width; canvas.height = img.height; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(rad);
    ctx.drawImage(img, -img.width / 2, -img.height / 2);
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if (blob) resolve(blob);
        else reject(new Error('Image rotation failed'));
      }, 'image/png');
    });
  },

  async watermarkImage(file, text, color) {
    const { canvas, ctx, img } = await this.imageToCanvas(file);
    const fontSize = Math.max(20, Math.min(canvas.width, canvas.height) / 15);
    ctx.font = `bold ${fontSize}px Arial`;
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(-Math.PI / 4);
    ctx.fillText(text, 0, 0);
    ctx.restore();
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if (blob) resolve(blob);
        else reject(new Error('Watermark failed'));
      }, 'image/png');
    });
  },

  // ========== IMAGE WATERMARK REMOVER ==========
  async removeImageWatermark(file, position, size) {
    const { canvas, ctx, img } = await this.imageToCanvas(file);
    const w = canvas.width, h = canvas.height;
    const area = this.getWatermarkArea(w, h, position, size);

    this.showProcessing(true, 'Analyzing watermark area...', 'Watermark Remover');

    // Simple inpainting: fill with average color of surrounding border pixels
    const imageData = ctx.getImageData(0, 0, w, h);
    const data = imageData.data;

    // Collect border pixels around the watermark area
    let rSum = 0, gSum = 0, bSum = 0, count = 0;
    const border = 10;

    // Sample pixels from a ring around the watermark area
    for (let y = Math.max(0, area.y - border); y < Math.min(h, area.y + area.h + border); y++) {
      for (let x = Math.max(0, area.x - border); x < Math.min(w, area.x + area.w + border); x++) {
        // Only sample the border ring, not inside the watermark area
        if (x < area.x || x >= area.x + area.w || y < area.y || y >= area.y + area.h) {
          const idx = (y * w + x) * 4;
          rSum += data[idx]; gSum += data[idx + 1]; bSum += data[idx + 2];
          count++;
        }
      }
    }

    const avgR = count > 0 ? Math.round(rSum / count) : 255;
    const avgG = count > 0 ? Math.round(gSum / count) : 255;
    const avgB = count > 0 ? Math.round(bSum / count) : 255;

    this.showProcessing(true, 'Inpainting watermark area...', 'Watermark Remover');

    // Better: use surrounding pixels to interpolate
    for (let y = area.y; y < area.y + area.h && y < h; y++) {
      for (let x = area.x; x < area.x + area.w && x < w; x++) {
        const idx = (y * w + x) * 4;

        // Distance-based blending from edges
        const distLeft = x - area.x;
        const distRight = (area.x + area.w) - x;
        const distTop = y - area.y;
        const distBottom = (area.y + area.h) - y;
        const minDist = Math.min(distLeft, distRight, distTop, distBottom);
        const maxDist = Math.max(area.w, area.h) / 2;
        const blend = Math.min(1, minDist / Math.max(1, maxDist * 0.3));

        // Sample from nearest edge
        let sampleX = x, sampleY = y;
        if (distLeft <= distRight && distLeft <= distTop && distLeft <= distBottom) sampleX = area.x;
        else if (distRight <= distTop && distRight <= distBottom) sampleX = area.x + area.w - 1;
        else if (distTop <= distBottom) sampleY = area.y;
        else sampleY = area.y + area.h - 1;

        sampleX = Math.max(0, Math.min(w - 1, sampleX));
        sampleY = Math.max(0, Math.min(h - 1, sampleY));
        const sampleIdx = (sampleY * w + sampleX) * 4;

        data[idx] = data[sampleIdx] * (1 - blend * 0.5) + avgR * (blend * 0.5);
        data[idx + 1] = data[sampleIdx + 1] * (1 - blend * 0.5) + avgG * (blend * 0.5);
        data[idx + 2] = data[sampleIdx + 2] * (1 - blend * 0.5) + avgB * (blend * 0.5);
        data[idx + 3] = 255;
      }
    }

    ctx.putImageData(imageData, 0, 0);

    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if (blob) resolve(blob);
        else reject(new Error('Watermark removal failed'));
      }, 'image/png');
    });
  },

  getWatermarkArea(w, h, position, size) {
    const sizeMap = { small: 0.1, medium: 0.2, large: 0.3 };
    const ratio = sizeMap[size] || 0.2;
    const areaW = Math.round(w * ratio);
    const areaH = Math.round(h * ratio);

    switch (position) {
      case 'bottom-right': return { x: w - areaW - 10, y: h - areaH - 10, w: areaW, h: areaH };
      case 'bottom-left': return { x: 10, y: h - areaH - 10, w: areaW, h: areaH };
      case 'top-right': return { x: w - areaW - 10, y: 10, w: areaW, h: areaH };
      case 'top-left': return { x: 10, y: 10, w: areaW, h: areaH };
      case 'center': return { x: Math.round((w - areaW) / 2), y: Math.round((h - areaH) / 2), w: areaW, h: areaH };
      case 'bottom': return { x: 0, y: h - Math.round(h * 0.12), w: w, h: Math.round(h * 0.12) };
      case 'top': return { x: 0, y: 0, w: w, h: Math.round(h * 0.12) };
      default: return { x: w - areaW - 10, y: h - areaH - 10, w: areaW, h: areaH };
    }
  },

  // ========== VIDEO WATERMARKER ==========
  async watermarkVideo(file, text, position, color, opacity) {
    return new Promise((resolve, reject) => {
      const video = document.createElement('video');
      video.src = URL.createObjectURL(file);
      video.muted = true;
      video.playsInline = true;

      video.onloadedmetadata = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const w = video.videoWidth;
        const h = video.videoHeight;
        canvas.width = w;
        canvas.height = h;

        const stream = canvas.captureStream(30);
        const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'video/webm' });
          resolve(blob);
        };

        // Color map
        const colorMap = {
          white: 'rgba(255,255,255,',
          black: 'rgba(0,0,0,',
          red: 'rgba(255,0,0,',
          yellow: 'rgba(255,255,0,'
        };
        const colorBase = colorMap[color] || colorMap.white;

        // Position
        const fontSize = Math.max(16, Math.min(w, h) / 20);
        ctx.font = `bold ${fontSize}px Arial`;
        const metrics = ctx.measureText(text);
        const textW = metrics.width;
        const textH = fontSize;
        let x = w - textW - 20, y = h - 20;
        switch (position) {
          case 'bottom-left': x = 20; break;
          case 'top-right': y = textH + 10; break;
          case 'top-left': x = 20; y = textH + 10; break;
          case 'center': x = (w - textW) / 2; y = h / 2 + textH / 2; break;
        }

        mediaRecorder.start();
        video.play();

        const maxDuration = 30; // seconds
        const startTime = Date.now();

        const drawFrame = () => {
          if (video.ended || video.paused || (Date.now() - startTime) / 1000 > maxDuration) {
            mediaRecorder.stop();
            URL.revokeObjectURL(video.src);
            return;
          }

          ctx.drawImage(video, 0, 0, w, h);
          ctx.fillStyle = colorBase + opacity + ')';
          ctx.fillText(text, x, y);

          requestAnimationFrame(drawFrame);
        };

        requestAnimationFrame(drawFrame);
      };

      video.onerror = () => reject(new Error('Could not load video'));
    });
  },

  // ========== VIDEO WATERMARK REMOVER ==========
  async removeVideoWatermark(file, position, size) {
    return new Promise((resolve, reject) => {
      const video = document.createElement('video');
      video.src = URL.createObjectURL(file);
      video.muted = true;
      video.playsInline = true;

      video.onloadedmetadata = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const w = video.videoWidth;
        const h = video.videoHeight;
        canvas.width = w;
        canvas.height = h;

        const area = this.getWatermarkArea(w, h, position, size);

        const stream = canvas.captureStream(30);
        const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'video/webm' });
          resolve(blob);
        };

        mediaRecorder.start();
        video.play();

        const maxDuration = 30;
        const startTime = Date.now();
        let frameCount = 0;

        const drawFrame = () => {
          if (video.ended || video.paused || (Date.now() - startTime) / 1000 > maxDuration) {
            mediaRecorder.stop();
            URL.revokeObjectURL(video.src);
            return;
          }

          ctx.drawImage(video, 0, 0, w, h);

          // Inpaint the watermark area
          this.inpaintArea(ctx, w, h, area);

          frameCount++;
          if (frameCount % 30 === 0) {
            this.showProcessing(true, `Processing frame ${frameCount}...`, 'Video Watermark Remover');
          }

          requestAnimationFrame(drawFrame);
        };

        requestAnimationFrame(drawFrame);
      };

      video.onerror = () => reject(new Error('Could not load video'));
    });
  },

  inpaintArea(ctx, w, h, area) {
    // Get surrounding pixels for averaging
    const border = 5;
    const sx = Math.max(0, area.x - border);
    const sy = Math.max(0, area.y - border);
    const sw = Math.min(w, area.x + area.w + border) - sx;
    const sh = Math.min(h, area.y + area.h + border) - sy;

    if (sw <= 0 || sh <= 0) return;

    try {
      const surroundData = ctx.getImageData(sx, sy, sw, sh);
      const d = surroundData.data;
      let r = 0, g = 0, b = 0, count = 0;

      for (let i = 0; i < d.length; i += 4) {
        const px = sx + (i / 4) % sw;
        const py = sy + Math.floor((i / 4) / sw);
        if (px < area.x || px >= area.x + area.w || py < area.y || py >= area.y + area.h) {
          r += d[i]; g += d[i + 1]; b += d[i + 2]; count++;
        }
      }

      if (count > 0) {
        ctx.fillStyle = `rgb(${Math.round(r / count)},${Math.round(g / count)},${Math.round(b / count)})`;
        ctx.fillRect(area.x, area.y, area.w, area.h);
      }
    } catch(e) {
      // Fallback: fill with white
      ctx.fillStyle = 'rgb(255,255,255)';
      ctx.fillRect(area.x, area.y, area.w, area.h);
    }
  },

  async createZip(files) {
    const zip = new JSZip();
    for (const file of files) zip.file(file.name, file);
    return await zip.generateAsync({ type: 'blob' });
  },

  async extractZip(file) {
    const zip = await JSZip.loadAsync(file);
    const newZip = new JSZip();
    const entries = [];
    zip.forEach((path, entry) => { if (!entry.dir) entries.push({ path, entry }); });
    for (const { path, entry } of entries) {
      const blob = await entry.async('blob');
      newZip.file(path, blob);
    }
    return await newZip.generateAsync({ type: 'blob' });
  },

  async mergeTextFiles(files) {
    let text = '';
    for (const file of files) text += await file.text() + '\n\n';
    return new Blob([text], { type: 'text/plain' });
  },

  async ocrImage(file) {
    const worker = await Tesseract.createWorker('eng');
    try {
      const { data: { text } } = await worker.recognize(file);
      return new Blob([text], { type: 'text/plain' });
    } finally {
      await worker.terminate();
    }
  },

  async showFileInfoAsync(file) {
    const reader = new FileReader();
    const info = await new Promise((resolve, reject) => {
      reader.onload = () => {
        const arr = new Uint8Array(reader.result);
        let magic = '';
        for (let i = 0; i < Math.min(8, arr.length); i++) magic += arr[i].toString(16).padStart(2, '0') + ' ';
        resolve({
          Name: file.name,
          Size: this.formatBytes(file.size) + ' (' + file.size + ' bytes)',
          Type: file.type || 'Unknown / Binary',
          'Last Modified': new Date(file.lastModified).toLocaleString(),
          'Magic Bytes': magic.toUpperCase()
        });
      };
      reader.onerror = () => reject(new Error('Could not read file info'));
      reader.readAsArrayBuffer(file.slice(0, 8));
    });

    // Store as blob for download (JSON)
    const json = JSON.stringify(info, null, 2);
    this.resultBlob = new Blob([json], { type: 'application/json' });
    this.resultName = 'file-info.json';
    this.resultUrl = URL.createObjectURL(this.resultBlob);

    const content = document.getElementById('outputContent');
    const sizeEl = document.getElementById('outputSize');
    const typeBadge = document.getElementById('outputTypeBadge');
    this.showOutput();
    if (sizeEl) sizeEl.textContent = this.formatBytes(this.resultBlob.size);
    if (typeBadge) typeBadge.textContent = 'JSON';

    const html = Object.entries(info).map(([k, v]) => `<div class="flex justify-between py-2 border-b border-slate-100"><span class="text-slate-500 text-sm">${k}</span><span class="font-mono text-sm text-slate-800">${v}</span></div>`).join('');
    content.innerHTML = `<div class="output-card w-full max-w-md bg-white p-6 rounded-xl border border-slate-200 shadow-sm">${html}</div>`;
  }
};

App.init();
</script>
